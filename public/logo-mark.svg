<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="es-crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Back shadow (deepest void) -->
  <rect x="184" y="184" width="216" height="216" rx="24"
        transform="rotate(45 292 292)" fill="#1e1b4b"/>
  <!-- Middle shadow -->
  <rect x="148" y="148" width="216" height="216" rx="24"
        transform="rotate(45 256 256)" fill="#4338ca"/>
  <!-- Front crystal -->
  <rect x="112" y="112" width="216" height="216" rx="24"
        transform="rotate(45 220 220)" fill="url(#es-crystal)"/>
</svg>
